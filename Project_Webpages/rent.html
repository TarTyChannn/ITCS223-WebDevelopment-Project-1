<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rent — Long Gone</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blood:#8b0000;--blood-light:#b30000;--dark:#111010;--dark2:#1a1919;--dark3:#222121;--font-display:'Cinzel',serif;--font-body:'Crimson Text',serif;}
body{background:var(--dark2);color:#fff;font-family:var(--font-body);min-height:100vh;}
nav{background:var(--dark);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;border-bottom:1px solid #2a2a2a;}
.nav-links{display:flex;gap:28px;}
.nav-links a{color:#ccc;text-decoration:none;font-family:var(--font-display);font-size:13px;letter-spacing:1px;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:#fff;} .nav-links a.active{color:var(--blood-light);}
.nav-brand{font-family:var(--font-display);font-size:22px;letter-spacing:4px;color:#fff;text-decoration:none;position:absolute;left:50%;transform:translateX(-50%);}
.admin-btn{background:var(--blood);color:#fff;border:none;padding:7px 16px;border-radius:3px;font-family:var(--font-display);font-size:12px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;}
.admin-btn:hover{background:var(--blood-light);}
.container{max-width:1100px;margin:0 auto;padding:36px 32px 60px;}
h1{font-family:var(--font-display);font-size:30px;font-weight:700;color:#fff;margin-bottom:20px;letter-spacing:2px;}
.filters{display:flex;gap:14px;align-items:flex-end;margin-bottom:28px;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:4px;} .fl{font-family:var(--font-display);font-size:11px;color:#aaa;letter-spacing:1px;}
.filter-select,.filter-input{background:rgba(255,255,255,.9);border:none;border-radius:4px;padding:8px 12px;font-family:var(--font-body);font-size:14px;color:#333;outline:none;}
.filter-input{min-width:200px;}
.search-btn{background:var(--blood);color:#fff;border:none;border-radius:4px;padding:9px 22px;font-family:var(--font-display);font-size:13px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;}
.search-btn:hover{background:var(--blood-light);}
.divider{border:none;border-top:1px solid #333;margin-bottom:28px;}
.no-results{grid-column:1/-1;text-align:center;color:#888;padding:60px 0;font-size:18px;font-style:italic;}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.house-card{background:var(--dark3);border-radius:8px;overflow:hidden;border:.5px solid #333;cursor:pointer;transition:transform .2s,border-color .2s;}
.house-card:hover{transform:translateY(-3px);border-color:var(--blood);}
.card-img{width:100%;height:185px;object-fit:cover;display:block;filter:brightness(.65) contrast(1.2) saturate(.5);transition:filter .3s;background:#1a1919;}
.house-card:hover .card-img{filter:brightness(.8) contrast(1.1) saturate(.65);}
.card-info{padding:12px 14px;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.card-name{font-family:var(--font-display);font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%;}
.badge{font-size:11px;font-family:var(--font-display);padding:2px 9px;border-radius:10px;flex-shrink:0;background:#dbeafe;color:#1d4ed8;}
.card-loc{font-size:13px;color:#888;margin-bottom:6px;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;}
.card-price{font-size:13px;color:var(--blood-light);font-weight:600;} .skulls{font-size:14px;}
footer{background:var(--dark);border-top:1px solid #2a2a2a;text-align:center;padding:24px;font-family:var(--font-display);font-size:12px;letter-spacing:2px;color:#555;margin-top:40px;}
@media(max-width:700px){.cards-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.cards-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <div class="nav-links">
    <a href="buy.html" >Buy</a>
    <a href="rent.html" class="active">Rent</a>
    <a href="team.html">Our Team</a>
  </div>
  <a class="nav-brand" href="homepage.html">Long Gone</a>
  <div><button class="admin-btn" id="adminBtn">&#128274; Admin</button></div>
</nav>
<div class="container">
  <h1>Rent Haunted House</h1>
  <div class="filters">
    <div class="fg"><span class="fl">Category</span>
      <select class="filter-select" id="catF"><option value="">All</option><option value="mansion">Mansion</option><option value="cottage">Cottage</option><option value="villa">Villa</option></select>
    </div>
    <div class="fg"><span class="fl">Rating</span>
      <select class="filter-select" id="rateF"><option value="0">Any</option><option value="3">3+</option><option value="4">4+</option><option value="5">5</option></select>
    </div>
    <div class="fg"><span class="fl">Location</span>
      <input class="filter-input" type="text" id="locF" placeholder="City, address..."/>
    </div>
    <button class="search-btn" id="searchBtn">&#128269; Search</button>
  </div>
  <hr class="divider"/>
  <div class="cards-grid" id="grid"></div>
</div>
<footer>&copy; 2024 Long Gone &mdash; All Spirits Reserved</footer>
<script>
// ═══════════════════════════════════════════════════════════════
//  LONG GONE — SHARED DATA STORE  (localStorage persistence)
// ═══════════════════════════════════════════════════════════════
var LG = (function() {
  var KEY = 'lgHouses';

  var DEFAULTS = [
    {id:67,name:"Haunted House in the Middle of Salaya",city:"Bangkok",area:"Salaya, Nakhon Pathom",location:"Salaya, Phutthamonthon, Nakhon Pathom, 73170",price:"500,000",type:"rent",rating:4,bedrooms:1,bathrooms:1,basement:1,updated:"16/2/2026",email:"haunted67@longgone.th",phone:"014-254-785",desc:"A historic Victorian-era estate nestled deep within misty Salaya forests. Original hardwood floors, gothic archways, and a sprawling garden of overgrown stone paths.",card:"https://picsum.photos/seed/ghost1/400/300",imgs:["https://picsum.photos/seed/ghost1/900/600","https://picsum.photos/seed/dark7/900/600","https://picsum.photos/seed/manor1/900/600"]},
    {id:68,name:"Old Victorian Manor",city:"Bangkok",area:"Nongkhok, 10530",location:"Nongkhok, Min Buri, Bangkok, 10530",price:"800,000",type:"buy",rating:5,bedrooms:3,bathrooms:2,basement:1,updated:"10/3/2026",email:"manor68@longgone.th",phone:"012-345-678",desc:"Grand Victorian manor with original stained glass and ornate plasterwork. Three stories of creaking floorboards and hidden passages. Vacant since 1987 after the previous owner mysteriously vanished.",card:"https://picsum.photos/seed/manor2/400/300",imgs:["https://picsum.photos/seed/manor2/900/600","https://picsum.photos/seed/ghost4/900/600","https://picsum.photos/seed/dark3/900/600"]},
    {id:69,name:"The Whisper House",city:"Chiang Mai",area:"Chiang Mai, 50000",location:"Mueang, Chiang Mai, 50000",price:"300,000",type:"rent",rating:3,bedrooms:2,bathrooms:1,basement:0,updated:"5/4/2026",email:"whisper69@longgone.th",phone:"053-123-456",desc:"A quaint wooden cottage known for strange whispering sounds that emanate from its walls on full moon nights. The structure dates back to the early 1900s.",card:"https://picsum.photos/seed/spooky3/400/300",imgs:["https://picsum.photos/seed/spooky3/900/600","https://picsum.photos/seed/ghost5/900/600","https://picsum.photos/seed/manor3/900/600"]},
    {id:70,name:"The Crow Estate",city:"Bangkok",area:"Nongkhok, 10530",location:"Nongkhok, Min Buri, Bangkok, 10530",price:"650,000",type:"buy",rating:4,bedrooms:2,bathrooms:2,basement:1,updated:"2/4/2026",email:"crow70@longgone.th",phone:"014-789-012",desc:"A secluded estate shrouded in century-old banyan trees, notorious for unexplained phenomena. The property includes a private cemetery from the original landowners.",card:"https://picsum.photos/seed/dark4/400/300",imgs:["https://picsum.photos/seed/dark4/900/600","https://picsum.photos/seed/spooky6/900/600","https://picsum.photos/seed/ghost1/900/600"]},
    {id:71,name:"The Mist Manor",city:"Chiang Rai",area:"Chiang Rai, 57000",location:"Mueang, Chiang Rai, 57000",price:"420,000",type:"rent",rating:5,bedrooms:2,bathrooms:1,basement:0,updated:"1/4/2026",email:"mist71@longgone.th",phone:"053-987-654",desc:"Perched on a hillside forever shrouded in morning mist. The previous tenants left all belongings behind — their whereabouts remain unknown.",card:"https://picsum.photos/seed/manor5/400/300",imgs:["https://picsum.photos/seed/manor5/900/600","https://picsum.photos/seed/dark2/900/600","https://picsum.photos/seed/ghost3/900/600"]},
    {id:72,name:"Shadowfall Cottage",city:"Phuket",area:"Kathu, Phuket",location:"Kathu, Phuket, 83120",price:"350,000",type:"rent",rating:4,bedrooms:1,bathrooms:1,basement:1,updated:"28/3/2026",email:"shadow72@longgone.th",phone:"076-123-456",desc:"A colonial-era bungalow hidden among rubber trees. Guests report hearing old gramophone music late at night.",card:"https://picsum.photos/seed/ghost6/400/300",imgs:["https://picsum.photos/seed/ghost6/900/600","https://picsum.photos/seed/manor4/900/600","https://picsum.photos/seed/spooky2/900/600"]},
    {id:73,name:"The Hollow Keep",city:"Ayutthaya",area:"Ayutthaya, 13000",location:"Phra Nakhon Si Ayutthaya, Ayutthaya, 13000",price:"750,000",type:"buy",rating:5,bedrooms:4,bathrooms:3,basement:2,updated:"15/3/2026",email:"hollow73@longgone.th",phone:"035-123-456",desc:"Built on ruins of a 17th century fort. The basement rooms are rumored to connect to ancient underground passages.",card:"https://picsum.photos/seed/dark7/400/300",imgs:["https://picsum.photos/seed/dark7/900/600","https://picsum.photos/seed/ghost2/900/600","https://picsum.photos/seed/manor6/900/600"]},
    {id:74,name:"Widow's Peak House",city:"Chiang Mai",area:"Doi Saket, Chiang Mai",location:"Doi Saket, Chiang Mai, 50220",price:"280,000",type:"rent",rating:3,bedrooms:2,bathrooms:1,basement:0,updated:"10/3/2026",email:"widow74@longgone.th",phone:"053-456-789",desc:"Perched atop a rocky hill. The original owner's rocking chair still moves on windless nights.",card:"https://picsum.photos/seed/spooky8/400/300",imgs:["https://picsum.photos/seed/spooky8/900/600","https://picsum.photos/seed/manor7/900/600","https://picsum.photos/seed/dark5/900/600"]}
  ];

  function load(){try{var r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}save(DEFAULTS);return JSON.parse(JSON.stringify(DEFAULTS));}
  function save(arr){try{localStorage.setItem(KEY,JSON.stringify(arr));}catch(e){}}
  function today(){var d=new Date();return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
  function getAll(){return load();}
  function getById(id){return load().find(function(h){return h.id===parseInt(id);})||null;}
  function update(id,patch){var arr=load();var i=arr.findIndex(function(h){return h.id===parseInt(id);});if(i===-1)return false;Object.keys(patch).forEach(function(k){arr[i][k]=patch[k];});arr[i].updated=today();save(arr);return true;}
  function add(house){var arr=load();var maxId=arr.reduce(function(m,h){return Math.max(m,h.id);},0);house.id=house.id&&!arr.find(function(h){return h.id===parseInt(house.id);})?parseInt(house.id):maxId+1;house.updated=today();house.card=house.card||'https://picsum.photos/seed/new'+house.id+'/400/300';house.imgs=house.imgs||['https://picsum.photos/seed/new'+house.id+'/900/600','https://picsum.photos/seed/new'+house.id+'b/900/600','https://picsum.photos/seed/new'+house.id+'c/900/600'];house.rating=house.rating||3;house.bedrooms=house.bedrooms||1;house.bathrooms=house.bathrooms||1;house.basement=house.basement||0;house.email=house.email||'info@longgone.th';house.phone=house.phone||'—';house.desc=house.desc||'A mysterious haunted property awaiting its next resident.';arr.push(house);save(arr);return house;}
  function remove(id){save(load().filter(function(h){return h.id!==parseInt(id);}));}
  function reset(){localStorage.removeItem(KEY);}
  return{getAll:getAll,getById:getById,update:update,add:add,remove:remove,reset:reset};
})();

function isAdmin(){if(localStorage.getItem('lgAdmin')==='true'){sessionStorage.setItem('lgAdmin','true');sessionStorage.setItem('lgAdminUser',localStorage.getItem('lgAdminUser')||'Admin');}return sessionStorage.getItem('lgAdmin')==='true';}
const btn=document.getElementById('adminBtn');
if(isAdmin()){btn.textContent='Dashboard';btn.onclick=()=>location.href='dashboard.html';}
else{btn.onclick=()=>location.href='admin-login.html';}




function render(data){
  const g=document.getElementById('grid'); g.innerHTML='';
  if(!data.length){g.innerHTML='<p class="no-results">No haunted houses found matching your search.</p>';return;}
  data.forEach(h=>{
    const d=document.createElement('div'); d.className='house-card';
    const img=document.createElement('img'); img.className='card-img'; img.src=h.card; img.alt=h.name; img.loading='lazy';
    const info=document.createElement('div'); info.className='card-info';
    info.innerHTML='<div class="card-top"><span class="card-name">'+h.name+'</span><span class="badge">Rent</span></div><div class="card-loc">&#128205; '+h.area+'</div><div class="card-bottom"><span class="card-price">'+h.price+' THB</span><span class="skulls">'+'&#128128;'.repeat(h.rating)+'</span></div>';
    d.appendChild(img); d.appendChild(info);
    d.addEventListener('click',()=>location.href='house-detail.html?id='+h.id);
    g.appendChild(d);
  });
}
render(LG.getAll().filter(function(h){return h.type==='rent';}))
document.getElementById('searchBtn').addEventListener('click',()=>{
  const q=document.getElementById('locF').value.toLowerCase().trim();
  const minR=parseInt(document.getElementById('rateF').value)||0;
  var base=LG.getAll().filter(function(h){return h.type==='rent';});render(q?base.filter(function(h){return (h.area.toLowerCase().includes(q)||h.name.toLowerCase().includes(q))&&h.rating>=minR;}):base.filter(function(h){return h.rating>=minR;}));
});
document.getElementById('locF').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('searchBtn').click();});
const sp=new URLSearchParams(location.search);
if(sp.get('location'))document.getElementById('locF').value=sp.get('location');
if(sp.get('rating'))document.getElementById('rateF').value=sp.get('rating');
var __base=LG.getAll().filter(function(h){return h.type==='rent';});if(sp.get('location')||sp.get('rating')){document.getElementById('searchBtn').click();}else{render(__base);}
</script>
</body>
</html>
