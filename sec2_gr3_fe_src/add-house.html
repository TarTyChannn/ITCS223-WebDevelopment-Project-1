<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>add-house — Long Gone Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="common-form-modal.css"/>
<style>

    .upload-area {
        border:2px dashed #bbb;
        border-radius:10px;
        padding:40px 20px;
        text-align:center;
        cursor:pointer;
        margin-bottom:12px;
        transition:border-color .2s;
    }

    .upload-area:hover {
        border-color:#666;
    }

    .upload-area svg {
        opacity:.4;
        margin-bottom:8px;
    }

    .upload-area p {
        font-size:14px;
        color:#888;
    }

    .upload-btn-wide {
        background:#2563eb;
        color:#fff;
        border:none;
        border-radius:7px;
        padding:12px;
        width:100%;
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:1px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        margin-top:8px;
    }

    #confirmPhase {
        display:none;
    }

    #uploadPhase {
        display:block;
    }


        </style>
</head>
<body>
<script>
function isAdmin() {
    if (localStorage.getItem('lgAdmin') === 'true') {
        sessionStorage.setItem('lgAdmin', 'true');
        sessionStorage.setItem('lgAdminUser', localStorage.getItem('lgAdminUser') || 'Admin');
    }
    return sessionStorage.getItem('lgAdmin') === 'true';
}

function getAdminUser() {
    return sessionStorage.getItem('lgAdminUser') || localStorage.getItem('lgAdminUser') || 'Admin';
}

function doLogout() {
    sessionStorage.removeItem('lgAdmin');
    localStorage.removeItem('lgAdmin');
    sessionStorage.removeItem('lgAdminUser');
    localStorage.removeItem('lgAdminUser');
    location.href = 'admin-login.html';
}
if (!isAdmin()) {
    location.href = 'admin-login.html';
}
        </script>

<div class="card">
  <h2>Add New House</h2>
  <div class="field"><label>House Name</label><input type="text" id="hName" placeholder="e.g. The Haunted Manor"/></div>
  <div class="field"><label>House ID</label><input type="text" id="hId" placeholder="Unique identifier"/></div>
  <div class="field"><label>Location</label><input type="text" id="hLoc" placeholder="City, Province, Postcode"/></div>
  <div class="field"><label>Price (THB)</label><input type="number" id="hPrice" placeholder="e.g. 500000"/></div>
  <div class="field"><label>Type</label>
    <select id="hType"><option value="rent">Rent</option><option value="buy">Buy</option></select>
  </div>
  <div class="field"><label>Description</label><textarea id="hDesc" placeholder="Describe the haunted property..."></textarea></div>
  <div class="actions">
    <button class="btn-cancel" onclick="location.href='dashboard.html'">Cancel</button>
    <button class="btn-confirm" id="confirmAdd">Confirm</button>
  </div>
</div>
<script>
document.getElementById('confirmAdd').addEventListener('click', () => {
    const name = document.getElementById('hName').value.trim();
    const id = document.getElementById('hId').value.trim();
    if (!name || !id) {
        alert('Please enter House Name and House ID.');
        return;
    }
    location.href = 'success.html?from=dashboard&success=' + encodeURIComponent('House "' + name + '" added successfully!');
});
        </script>
</body>
</html>
