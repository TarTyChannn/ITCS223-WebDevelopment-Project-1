<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buy — Long Gone</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="common-public-nav.css"/>
<style>
    .container {
        max-width:1100px;
        margin:0 auto;
        padding:36px 32px 60px;
    }

    h1 {
        font-family:var(--font-display);
        font-size:30px;
        font-weight:700;
        color:#fff;
        margin-bottom:20px;
        letter-spacing:2px;
    }

    .filters {
        display:flex;
        gap:14px;
        align-items:flex-end;
        margin-bottom:28px;
        flex-wrap:wrap;
    }

    .fg {
        display:flex;
        flex-direction:column;
        gap:4px;
    }
    .fl {
        font-family:var(--font-display);
        font-size:11px;
        color:#aaa;
        letter-spacing:1px;
    }

    .filter-select,.filter-input {
        background:rgba(255,255,255,.9);
        border:none;
        border-radius:4px;
        padding:8px 12px;
        font-family:var(--font-body);
        font-size:14px;
        color:#333;
        outline:none;
    }

    .filter-input {
        min-width:200px;
    }

    .search-btn {
        background:var(--blood);
        color:#fff;
        border:none;
        border-radius:4px;
        padding:9px 22px;
        font-family:var(--font-display);
        font-size:13px;
        letter-spacing:1px;
        cursor:pointer;
        display:flex;
        align-items:center;
        gap:6px;
        transition:background .2s;
    }

    .search-btn:hover {
        background:var(--blood-light);
    }

    .divider {
        border:none;
        border-top:1px solid #333;
        margin-bottom:28px;
    }

    .no-results {
        grid-column:1/-1;
        text-align:center;
        color:#888;
        padding:60px 0;
        font-size:18px;
        font-style:italic;
    }

    .cards-grid {
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:18px;
    }

    .house-card {
        background:var(--dark3);
        border-radius:8px;
        overflow:hidden;
        border:.5px solid #333;
        cursor:pointer;
        transition:transform .2s,border-color .2s;
    }

    .house-card:hover {
        transform:translateY(-3px);
        border-color:var(--blood);
    }

    .card-img {
        width:100%;
        height:185px;
        object-fit:cover;
        display:block;
        filter:brightness(.65) contrast(1.2) saturate(.5);
        transition:filter .3s;
        background:#1a1919;
    }

    .house-card:hover .card-img {
        filter:brightness(.8) contrast(1.1) saturate(.65);
    }

    .card-info {
        padding:12px 14px;
    }

    .card-top {
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:6px;
    }

    .card-name {
        font-family:var(--font-display);
        font-size:13px;
        color:#fff;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        max-width:70%;
    }

    .badge {
        font-size:11px;
        font-family:var(--font-display);
        padding:2px 9px;
        border-radius:10px;
        flex-shrink:0;
        background:#dcfce7;
        color:#15803d;
    }

    .card-loc {
        font-size:13px;
        color:#888;
        margin-bottom:6px;
    }

    .card-bottom {
        display:flex;
        align-items:center;
        justify-content:space-between;
    }

    .card-price {
        font-size:13px;
        color:var(--blood-light);
        font-weight:600;
    }
    .skulls {
        font-size:14px;
    }

    footer {
        background:var(--dark);
        border-top:1px solid #2a2a2a;
        text-align:center;
        padding:24px;
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:2px;
        color:#555;
        margin-top:40px;
    }

    @media(max-width:700px) {
        .cards-grid {
            grid-template-columns:1fr 1fr;
        }
    }

    @media(max-width:480px) {
        .cards-grid {
            grid-template-columns:1fr;
        }
    }


        </style>
</head>
<body>
<nav>
  <div class="nav-links">
    <a href="buy.html" class="active">Buy</a>
    <a href="rent.html" >Rent</a>
    <a href="team.html">Our Team</a>
  </div>
  <a class="nav-brand" href="homepage.html">Long Gone</a>
  <div><button class="admin-btn" id="adminBtn">&#128274; Admin</button></div>
</nav>
<div class="container">
  <h1>Buy Haunted House</h1>
  <div class="filters">
    <div class="fg"><span class="fl">Category</span>
      <select class="filter-select" id="catF"><option value="">All</option><option value="mansion">Mansion</option><option value="cottage">Cottage</option><option value="villa">Villa</option></select>
    </div>
    <div class="fg"><span class="fl">Rating</span>
      <select class="filter-select" id="rateF"><option value="0">Any</option><option value="3">3+</option><option value="4">4+</option><option value="5">5</option></select>
    </div>
    <div class="fg"><span class="fl">Location</span>
      <input class="filter-input" type="text" id="locF" placeholder="City, address..."/>
    </div>
    <button class="search-btn" id="searchBtn">&#128269; Search</button>
  </div>
  <hr class="divider"/>
  <div class="cards-grid" id="grid"></div>
</div>
<footer>&copy; 2024 Long Gone &mdash; All Spirits Reserved</footer>
<script src="script.js"></script>
    <script>





function render(data) {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    if (!data.length) {
        g.innerHTML = '<p class="no-results">No haunted houses found matching your search.</p>';
        return;
    }
    data.forEach(h => {
        const d = document.createElement('div');
        d.className = 'house-card';
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = h.card;
        img.alt = h.name;
        img.loading = 'lazy';
        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = '<div class="card-top"><span class="card-name">' + h.name + '</span><span class="badge">Buy</span></div><div class="card-loc">&#128205; ' + h.area + '</div><div class="card-bottom"><span class="card-price">' + h.price + ' THB</span><span class="skulls">' + '&#128128;'.repeat(h.rating) + '</span></div>';
        d.appendChild(img);
        d.appendChild(info);
        d.addEventListener('click', () => location.href = 'house-detail.html?id=' + h.id);
        g.appendChild(d);
    });
}
render(LG.getAll().filter(function(h) {
    return h.type === 'buy';
}))
document.getElementById('searchBtn').addEventListener('click', () => {
    const q = document.getElementById('locF').value.toLowerCase().trim();
    const minR = parseInt(document.getElementById('rateF').value) || 0;
    var base = LG.getAll().filter(function(h) {
        return h.type === 'buy';
    });
    render(q ? base.filter(function(h) {
        return (h.area.toLowerCase().includes(q) || h.name.toLowerCase().includes(q)) && h.rating >= minR;
    }) : base.filter(function(h) {
        return h.rating >= minR;
    }));
});
document.getElementById('locF').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
});
const sp = new URLSearchParams(location.search);
if (sp.get('location')) document.getElementById('locF').value = sp.get('location');
if (sp.get('rating')) document.getElementById('rateF').value = sp.get('rating');
var __base = LG.getAll().filter(function(h) {
    return h.type === 'buy';
});
if (sp.get('location') || sp.get('rating')) {
    document.getElementById('searchBtn').click();
} else {
    render(__base);
}
        </script>
</body>
</html>
