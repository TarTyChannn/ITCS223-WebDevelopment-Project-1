<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>House Detail — Long Gone</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/html/common-public-nav.css"/>
<style>
    .container {
        max-width:1200px;
        margin:0 auto;
        padding:28px 32px 80px;
    }

    .back-link {
        color:#888;
        font-size:13px;
        display:inline-flex;
        align-items:center;
        gap:6px;
        margin-bottom:24px;
        cursor:pointer;
        transition:color .2s;
        text-decoration:none;
        font-family:var(--font-display);
        letter-spacing:1px;
    }

    .back-link:hover {
        color:#fff;
    }

    .detail-layout {
        display:grid;
        grid-template-columns:180px 1fr 340px;
        gap:24px;
        align-items:start;
    }

    .thumb-col {
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:10px;
    }

    .thumb-nav {
        background:none;
        border:none;
        color:#666;
        font-size:22px;
        cursor:pointer;
        padding:2px 8px;
        transition:color .2s;
    }

    .thumb-nav:hover {
        color:#fff;
    }

    .thumb-item {
        width:155px;
        height:105px;
        object-fit:cover;
        border-radius:7px;
        cursor:pointer;
        border:2px solid transparent;
        transition:border-color .2s;
        filter:brightness(.65) contrast(1.2) saturate(.5);
        background:#1a1919;
    }

    .thumb-item:hover,.thumb-item.active {
        border-color:var(--blood);
    }

    .main-img {
        width:100%;
        aspect-ratio:4/3;
        object-fit:cover;
        border-radius:10px;
        filter:brightness(.7) contrast(1.15) saturate(.55);
        display:block;
        background:#1a1919;
    }

    .detail-title {
        font-family:var(--font-display);
        font-size:26px;
        font-weight:700;
        line-height:1.3;
        margin-bottom:16px;
    }

    .tags {
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        margin-bottom:20px;
    }

    .tag {
        background:#2a2a2a;
        border-radius:20px;
        padding:4px 14px;
        font-size:13px;
        color:#bbb;
    }

    .info-row {
        display:flex;
        align-items:flex-start;
        gap:16px;
        margin-bottom:16px;
    }

    .info-label {
        font-family:var(--font-display);
        font-size:13px;
        letter-spacing:1px;
        color:#888;
        min-width:70px;
        padding-top:3px;
    }

    .skulls-lg {
        font-size:22px;
        display:flex;
    }

    .price-val {
        font-size:28px;
        font-weight:700;
        color:#3ddc84;
        font-family:var(--font-display);
    }

    .map-ph {
        width:155px;
        height:100px;
        border-radius:8px;
        background:#0d1a0d;
        border:1px solid #2a3a2a;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        gap:4px;
        color:#4a8a4a;
        font-size:12px;
        font-family:var(--font-display);
        letter-spacing:1px;
        text-align:center;
        padding:8px;
    }

    .request-btn {
        display:block;
        width:100%;
        background:var(--blood);
        color:#fff;
        border:none;
        border-radius:8px;
        padding:16px;
        font-family:var(--font-display);
        font-size:16px;
        letter-spacing:1px;
        cursor:pointer;
        transition:background .2s;
        text-align:center;
        margin-top:20px;
    }

    .request-btn:hover {
        background:var(--blood-light);
    }

    /* Admin edit bar - only shown when logged in as admin */
    .admin-edit-bar {
        display:none;
        background:rgba(17,16,16,.97);
        border-top:2px solid var(--blood);
        padding:12px 32px;
        position:fixed;
        bottom:0;
        left:0;
        right:0;
        z-index:50;
        align-items:center;
        justify-content:space-between;
    }

    .admin-edit-bar.show {
        display:flex;
    }

    .aeb-left {
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:1px;
        color:#888;
    }

    .aeb-left strong {
        color:#3ddc84;
    }

    .aeb-btns {
        display:flex;
        gap:10px;
    }

    .aeb-btn {
        border:none;
        border-radius:5px;
        padding:8px 18px;
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:.5px;
        cursor:pointer;
        transition:opacity .2s;
    }

    .aeb-btn:hover {
        opacity:.85;
    }

    .aeb-edit {
        background:#c8941a;
        color:#fff;
    }

    .aeb-logout {
        background:#444;
        color:#ccc;
    }

    .detail-body {
        margin-top:40px;
    }

    .detail-row {
        display:grid;
        grid-template-columns:180px 1fr 340px;
        gap:24px;
        padding:24px 0;
        border-top:1px solid #222;
        align-items:start;
    }

    .detail-row:last-child {
        border-bottom:1px solid #222;
    }

    .row-label {
        font-family:var(--font-display);
        font-size:15px;
        font-weight:600;
        color:#fff;
    }

    .row-val {
        font-size:16px;
        color:#bbb;
        line-height:1.7;
    }

    .contact-card {
        background:var(--dark3);
        border-radius:10px;
        padding:22px;
    }

    .contact-card h3 {
        font-family:var(--font-display);
        font-size:17px;
        font-weight:700;
        margin-bottom:12px;
    }

    .contact-card p {
        font-size:14px;
        color:#bbb;
        line-height:2;
    }

    .contact-card a {
        color:var(--blood-light);
        text-decoration:none;
    }

    /* Modal */
    .overlay {
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.65);
        z-index:200;
        align-items:center;
        justify-content:center;
    }

    .overlay.show {
        display:flex;
    }

    .modal {
        background:#1e1e1e;
        border-radius:14px;
        padding:36px;
        min-width:380px;
        max-width:480px;
        width:90%;
        border:1px solid #333;
        animation:popIn .2s ease;
    }

    @keyframes popIn {
        from {
            transform:scale(.95);
            opacity:0
        }
        to {
            transform:scale(1);
            opacity:1
        }
    }

    .modal h2 {
        font-family:var(--font-display);
        font-size:20px;
        margin-bottom:20px;
        color:#fff;
    }

    .mfield {
        margin-bottom:16px;
    }

    .mfield label {
        display:block;
        font-size:12px;
        color:#aaa;
        margin-bottom:6px;
        font-family:var(--font-display);
        letter-spacing:1px;
    }

    .mfield input,.mfield textarea {
        width:100%;
        background:#2a2a2a;
        border:1px solid #444;
        border-radius:6px;
        padding:10px 14px;
        font-size:15px;
        color:#fff;
        outline:none;
        font-family:var(--font-body);
    }

    .mfield textarea {
        height:80px;
        resize:vertical;
    }

    .mactions {
        display:flex;
        gap:12px;
        margin-top:8px;
    }

    .btn-cancel {
        flex:1;
        background:#444;
        color:#fff;
        border:none;
        border-radius:6px;
        padding:11px;
        font-family:var(--font-display);
        font-size:13px;
        cursor:pointer;
    }

    .btn-submit {
        flex:2;
        background:var(--blood);
        color:#fff;
        border:none;
        border-radius:6px;
        padding:11px;
        font-family:var(--font-display);
        font-size:13px;
        cursor:pointer;
    }

    .btn-submit:hover {
        background:var(--blood-light);
    }

    footer {
        background:var(--dark);
        border-top:1px solid #2a2a2a;
        text-align:center;
        padding:24px;
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:2px;
        color:#555;
    }

    @media(max-width:900px) {
        .detail-layout,.detail-row {
            grid-template-columns:1fr;
        }
    }


        </style>
</head>
<body>
<nav>
  <div class="nav-links">
    <a href="/buy">Buy</a>
    <a href="/rent">Rent</a>
    <a href="/team">Our Team</a>
  </div>
  <a class="nav-brand" href="/">Long Gone</a>
  <div><button class="admin-btn" id="adminBtn">&#128274; Admin</button></div>
</nav>
<div class="container">
  <a class="back-link" onclick="history.back()">&#8592; Return</a>
  <div class="detail-layout">
    <div class="thumb-col">
      <button class="thumb-nav" id="thumbUp">&#8963;</button>
      <div id="thumbList"></div>
      <button class="thumb-nav" id="thumbDown">&#8964;</button>
    </div>
    <img class="main-img" id="mainImg" src="" alt=""/>
    <div id="detailInfo"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>
<footer>&copy; 2024 Long Gone &mdash; All Spirits Reserved</footer>

<!-- Admin edit bar (admin only) -->
<div class="admin-edit-bar" id="adminBar">
  <span class="aeb-left">&#128274; Admin Mode — logged in as <strong id="adminBarUser"></strong></span>
  <div class="aeb-btns">
    <button class="aeb-btn aeb-edit" id="editThisBtn">&#9998; Edit This House</button>
    <button class="aeb-btn aeb-logout" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<!-- Viewing Modal -->
<div class="overlay" id="viewModal">
  <div class="modal">
    <h2>&#128197; Request a Viewing</h2>
    <div class="mfield"><label>Your Name</label><input type="text" id="vName" placeholder="Full Name"/></div>
    <div class="mfield"><label>Phone / Email</label><input type="text" id="vContact" placeholder="Contact info"/></div>
    <div class="mfield"><label>Preferred Date</label><input type="date" id="vDate"/></div>
    <div class="mfield"><label>Message</label><textarea id="vMsg" placeholder="Any additional notes..."></textarea></div>
    <div class="mactions">
      <button class="btn-cancel" onclick="document.getElementById('viewModal').classList.remove('show')">Cancel</button>
      <button class="btn-submit" id="submitViewing">Submit Request</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
    <script>






// Get house
const sp = new URLSearchParams(location.search);
var hid = parseInt(sp.get('id')) || 67;
var H = LG.getById(hid) || LG.getAll()[0];
document.title = H.name + ' — Long Gone';

// Thumbnails
const thumbList = document.getElementById('thumbList');
H.imgs.forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'thumb-item' + (i === 0 ? ' active' : '');
    img.src = src.replace('/900/600', '/400/280');
    img.alt = 'Image ' + (i + 1);
    img.onclick = () => {
        document.getElementById('mainImg').src = src;
        document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active'));
        img.classList.add('active');
    };
    thumbList.appendChild(img);
});
document.getElementById('mainImg').src = H.imgs[0];
document.getElementById('mainImg').alt = H.name;

// Detail info panel
const typeLabel = H.type === 'buy' ? 'For Sale' : 'For Rent';
const typeBg = H.type === 'buy' ? '#dcfce7' : '#dbeafe';
const typeColor = H.type === 'buy' ? '#15803d' : '#1d4ed8';
const skullsHtml = '&#128128;'.repeat(H.rating) + '<span style="opacity:.25">' + '&#128128;'.repeat(5 - H.rating) + '</span>';
const tagsHtml = (H.bedrooms ? `<span class="tag">${H.bedrooms} Bedroom${H.bedrooms>1?'s':''}</span>` : '') +
    (H.bathrooms ? `<span class="tag">${H.bathrooms} Bathroom${H.bathrooms>1?'s':''}</span>` : '') +
    (H.basement ? `<span class="tag">${H.basement} Basement${H.basement>1?'s':''}</span>` : '');

document.getElementById('detailInfo').innerHTML = `
  <h1 class="detail-title">${H.name}</h1>
  <div class="tags"><span style="background:${typeBg};color:${typeColor};border-radius:20px;padding:4px 14px;font-size:13px;font-family:var(--font-display)">${typeLabel}</span>${tagsHtml}</div>
  <div class="info-row">
    <span class="info-label">Rating</span>
    <div class="skulls-lg">${skullsHtml}</div>
    <div class="map-ph">&#128205;<span>${H.location.split(',').slice(-2).join(',').trim()}</span></div>
  </div>
  <div class="info-row">
    <span class="info-label">Price</span>
    <span class="price-val">${H.price} THB${H.type==='rent'?'<span style="font-size:16px;color:#888;font-family:var(--font-body)">/mo</span>':''}</span>
  </div>
  <button class="request-btn" id="requestBtn">&#128197; Request Viewing</button>
`;

document.getElementById('detailBody').innerHTML = `
  <div class="detail-row">
    <span class="row-label">Description</span>
    <p class="row-val">${H.desc}</p>
    <div></div>
  </div>
  <div class="detail-row">
    <span class="row-label">House ID</span>
    <span class="row-val">${H.id}</span>
    <div></div>
  </div>
  <div class="detail-row">
    <span class="row-label">Location</span>
    <span class="row-val">${H.location}</span>
    <div class="contact-card">
      <h3>Contact</h3>
      <p>Email: <a href="mailto:${H.email}">${H.email}</a><br>Phone: <a href="tel:${H.phone}">${H.phone}</a></p>
    </div>
  </div>
  <div class="detail-row">
    <span class="row-label">Last Updated</span>
    <span class="row-val">${H.updated}</span>
    <div></div>
  </div>
`;

// Admin bar - ONLY show if logged in as admin
if (isAdmin()) {
    const bar = document.getElementById('adminBar');
    bar.classList.add('show');
    const user = sessionStorage.getItem('lgAdminUser') || localStorage.getItem('lgAdminUser') || 'Admin';
    document.getElementById('adminBarUser').textContent = user;
    document.getElementById('editThisBtn').onclick = () => location.href = '/admin/edit?id=' + H.id;
    // Add padding to body so content isn't hidden behind bar
    document.body.style.paddingBottom = '60px';
}

// Request viewing
document.getElementById('requestBtn').addEventListener('click', () => document.getElementById('viewModal').classList.add('show'));
document.getElementById('submitViewing').addEventListener('click', () => {
    const name = document.getElementById('vName').value.trim();
    const contact = document.getElementById('vContact').value.trim();
    if (!name || !contact) {
        alert('Please fill in your name and contact info.');
        return;
    }
    document.getElementById('viewModal').classList.remove('show');
    location.href = '/success?from=detail&id=' + H.id + '&msg=' + encodeURIComponent('Your viewing request for "' + H.name + '" has been submitted!');
});
document.getElementById('viewModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
});

// Thumb navigation
let tOff = 0;
document.getElementById('thumbUp').addEventListener('click', () => {
    tOff = Math.max(0, tOff - 1);
    updateThumbs();
});
document.getElementById('thumbDown').addEventListener('click', () => {
    tOff = Math.min(H.imgs.length - 1, tOff + 1);
    updateThumbs();
});

function updateThumbs() {
    document.querySelectorAll('.thumb-item').forEach((img, i) => img.style.display = i >= tOff && i < tOff + 3 ? 'block' : 'none');
}
        </script>
</body>
</html>
