<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Success — Long Gone</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/html/common-form-modal.css"/>
<style>

    .card {
        background: #e8e8e8;
        border-radius: 16px;
        padding: 52px 56px;
        text-align: center;
        max-width: 420px;
        width: 90%;
        box-shadow: 0 6px 28px rgba(0, 0, 0, .18);
    }

    .card h1 {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 700;
        color: #111;
        margin-bottom: 8px;
    }

    .sub {
        font-size: 15px;
        color: #666;
        margin-bottom: 28px;
        font-style: italic;
        min-height: 22px;
        padding: 0 8px;
    }

    .check-circle {
        width: 90px;
        height: 90px;
        background: #2e9e5e;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 28px;
        animation: pop .4s ease;
    }

    @keyframes pop {
        from {
            transform: scale(0)
        }
        to {
            transform: scale(1)
        }
    }

    .check-circle svg {
        width: 48px;
        height: 48px;
    }

    .return-btn {
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 13px 38px;
        font-family: var(--font-display);
        font-size: 14px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: background .2s;
    }

    .return-btn:hover {
        background: #1d4ed8;
    }


        </style>
</head>
<body>
<div class="card">
  <h1 id="titleText">Action Completed</h1>
  <p class="sub" id="msgText"></p>
  <div class="check-circle">
    <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 26L20 36L40 16" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <button class="return-btn" id="returnBtn">Return</button>
</div>
<script>
var sp = new URLSearchParams(location.search);
var from = sp.get('from') || '';
var id = sp.get('id') || '';
var msg = sp.get('msg') || sp.get('success') || '';

// Set title based on action type
var titles = {
    'detail': 'Request Submitted!',
    'edit': 'Edited Successfully',
    'dashboard': 'Action Completed',
    'add': 'House Added!'
};
document.getElementById('titleText').textContent = titles[from] || 'Action Completed';

// Show custom message
if (msg) document.getElementById('msgText').textContent = decodeURIComponent(msg);

// Smart return routing
var btn = document.getElementById('returnBtn');
if (from === 'dashboard' || from === 'add') {
    btn.onclick = function() {
        location.href = '/admin/dashboard';
    };
} else if (from === 'edit') {
    btn.onclick = function() {
        location.href = '/admin/edit?id=' + id;
    };
} else if (from === 'detail') {
    btn.onclick = function() {
        location.href = '/house?id=' + id;
    };
} else {
    btn.onclick = function() {
        history.go(-2);
    };
}
        </script>
</body>
</html>
