<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>edit-name — Long Gone Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="common-form-modal.css"/>
</head>
<body>
<script>
function isAdmin() {
    if (localStorage.getItem('lgAdmin') === 'true') {
        sessionStorage.setItem('lgAdmin', 'true');
        sessionStorage.setItem('lgAdminUser', localStorage.getItem('lgAdminUser') || 'Admin');
    }
    return sessionStorage.getItem('lgAdmin') === 'true';
}

function getAdminUser() {
    return sessionStorage.getItem('lgAdminUser') || localStorage.getItem('lgAdminUser') || 'Admin';
}

function doLogout() {
    sessionStorage.removeItem('lgAdmin');
    localStorage.removeItem('lgAdmin');
    sessionStorage.removeItem('lgAdminUser');
    localStorage.removeItem('lgAdminUser');
    location.href = 'admin-login.html';
}
if (!isAdmin()) {
    location.href = 'admin-login.html';
}
        </script>

<div class="card">
  <h2>Edit House Name</h2>
  <div class="field"><label>House Name</label><input type="text" id="nameIn" placeholder="Enter new house name"/></div>
  <div class="actions">
    <button class="btn-cancel" onclick="history.back()">Return</button>
    <button class="btn-confirm" id="saveBtn">Edit</button>
  </div>
</div>
<script>
const sp = new URLSearchParams(location.search);
const hid = sp.get('id') || '';
if (sp.get('current')) document.getElementById('nameIn').value = decodeURIComponent(sp.get('current'));
document.getElementById('saveBtn').addEventListener('click', () => {
    const v = document.getElementById('nameIn').value.trim();
    if (!v) {
        alert('Please enter a house name.');
        return;
    }
    location.href = 'success.html?from=edit&id=' + hid + '&success=' + encodeURIComponent('House name updated to "' + v + '"!');
});
        </script>
</body>
</html>
