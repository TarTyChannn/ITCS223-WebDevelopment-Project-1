<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>edit-image — Long Gone Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>

    *,*::before,*::after {
        box-sizing:border-box;
        margin:0;
        padding:0;
    }

    :root {
        --font-display:'Cinzel',serif;
        --font-body:'Crimson Text',serif;
    }

    body {
        background:#d0d0d0;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family:var(--font-body);
    }

    .card {
        background:#e8e8e8;
        border-radius:14px;
        padding:36px;
        min-width:380px;
        max-width:520px;
        width:90%;
        box-shadow:0 4px 20px rgba(0,0,0,.15);
    }

    .card h2 {
        font-family:var(--font-display);
        font-size:22px;
        color:#111;
        margin-bottom:26px;
    }

    .field {
        display:flex;
        align-items:flex-start;
        gap:14px;
        margin-bottom:18px;
    }

    .field label {
        font-size:14px;
        color:#333;
        min-width:110px;
        padding-top:10px;
    }

    .field input,.field select,.field textarea {
        flex:1;
        background:#fff;
        border:1px solid #ddd;
        border-radius:6px;
        padding:10px 14px;
        font-size:14px;
        color:#333;
        outline:none;
        font-family:var(--font-body);
    }

    .field textarea {
        height:90px;
        resize:vertical;
    }

    .actions {
        display:flex;
        gap:12px;
        justify-content:center;
        margin-top:10px;
    }

    .btn-cancel {
        background:#888;
        color:#fff;
        border:none;
        border-radius:6px;
        padding:11px 26px;
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:1px;
        cursor:pointer;
    }

    .btn-confirm {
        background:#2563eb;
        color:#fff;
        border:none;
        border-radius:6px;
        padding:11px 26px;
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:1px;
        cursor:pointer;
    }

    .btn-confirm:hover {
        background:#1d4ed8;
    }

    .upload-area {
        border:2px dashed #bbb;
        border-radius:10px;
        padding:40px 20px;
        text-align:center;
        cursor:pointer;
        margin-bottom:12px;
        transition:border-color .2s;
    }

    .upload-area:hover {
        border-color:#666;
    }

    .upload-area svg {
        opacity:.4;
        margin-bottom:8px;
    }

    .upload-area p {
        font-size:14px;
        color:#888;
    }

    .upload-btn-wide {
        background:#2563eb;
        color:#fff;
        border:none;
        border-radius:7px;
        padding:12px;
        width:100%;
        font-family:var(--font-display);
        font-size:12px;
        letter-spacing:1px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        margin-top:8px;
    }

    #confirmPhase {
        display:none;
    }

    #uploadPhase {
        display:block;
    }


        </style>
</head>
<body>
<script>
function isAdmin() {
    if (localStorage.getItem('lgAdmin') === 'true') {
        sessionStorage.setItem('lgAdmin', 'true');
        sessionStorage.setItem('lgAdminUser', localStorage.getItem('lgAdminUser') || 'Admin');
    }
    return sessionStorage.getItem('lgAdmin') === 'true';
}

function getAdminUser() {
    return sessionStorage.getItem('lgAdminUser') || localStorage.getItem('lgAdminUser') || 'Admin';
}

function doLogout() {
    sessionStorage.removeItem('lgAdmin');
    localStorage.removeItem('lgAdmin');
    sessionStorage.removeItem('lgAdminUser');
    localStorage.removeItem('lgAdminUser');
    location.href = 'admin-login.html';
}
if (!isAdmin()) {
    location.href = 'admin-login.html';
}
        </script>

<div class="card">
  <div id="uploadPhase">
    <h2>Upload Image</h2>
    <div class="upload-area" id="dropZone">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="12" width="56" height="40" rx="4" stroke="#999" stroke-width="3"/>
        <circle cx="22" cy="28" r="6" stroke="#999" stroke-width="2.5"/>
        <path d="M4 44l14-14 10 10 8-8 14 14" stroke="#999" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="44" cy="52" r="10" fill="#2563eb"/>
        <path d="M44 47v10M39 52h10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <p>Click or drag an image here</p>
    </div>
    <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="handleFile(event)"/>
    <button class="upload-btn-wide" onclick="document.getElementById('fileIn').click()">&#11014; Upload Image</button>
    <div class="actions" style="margin-top:16px">
      <button class="btn-cancel" onclick="history.back()">Cancel</button>
    </div>
  </div>
  <div id="confirmPhase">
    <h2>Confirm Image</h2>
    <div style="border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-bottom:12px">
      <img id="prevImg" style="width:100%;height:240px;object-fit:contain;display:block;background:#f9f9f9"/>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:14px;margin-bottom:16px">
      <button style="background:none;border:1px solid #aaa;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:16px" title="Crop">&#11034;</button>
      <button style="background:none;border:1px solid #aaa;border-radius:4px;padding:5px 10px;cursor:pointer;font-size:16px" title="Rotate">&#8635;</button>
    </div>
    <div class="actions">
      <button class="btn-cancel" onclick="resetUpload()">Cancel</button>
      <button class="btn-confirm" onclick="confirmUpload()">Confirm</button>
    </div>
  </div>
</div>
<script>
const sp = new URLSearchParams(location.search);
const hid = sp.get('id') || '';

function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        document.getElementById('prevImg').src = ev.target.result;
        document.getElementById('uploadPhase').style.display = 'none';
        document.getElementById('confirmPhase').style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function resetUpload() {
    document.getElementById('uploadPhase').style.display = 'block';
    document.getElementById('confirmPhase').style.display = 'none';
    document.getElementById('fileIn').value = '';
}

function confirmUpload() {
    location.href = 'success.html?from=edit&id=' + hid + '&success=' + encodeURIComponent('Image updated successfully!');
}
document.getElementById('dropZone').addEventListener('dragover', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = '#333';
});
document.getElementById('dropZone').addEventListener('dragleave', e => {
    e.currentTarget.style.borderColor = '#bbb';
});
document.getElementById('dropZone').addEventListener('drop', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = '#bbb';
    const file = e.dataTransfer.files[0];
    if (file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('fileIn').files = dt.files;
        handleFile({
            target: document.getElementById('fileIn')
        });
    }
});
        </script>
</body>
</html>
