<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>edit-price — Long Gone Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="common-form-modal.css"/>
</head>
<body>
<script src="script.js"></script>
    <script>




if (!isAdmin()) {
    location.href = 'admin-login.html';
}
        </script>

<div class="card">
  <h2>Edit House Price</h2>
  <div class="field"><label>Price (THB)</label><input type="number" id="priceIn" placeholder="Enter new price"/></div>
  <div class="field"><label>Type</label>
    <select id="typeIn"><option value="rent">For Rent (monthly)</option><option value="buy">For Sale</option></select>
  </div>
  <div class="actions">
    <button class="btn-cancel" onclick="history.back()">Return</button>
    <button class="btn-confirm" id="saveBtn">Edit</button>
  </div>
</div>
<script>
const sp = new URLSearchParams(location.search);
const hid = sp.get('id') || '';
if (sp.get('current')) document.getElementById('priceIn').value = sp.get('current').replace(/,/g, '');
document.getElementById('saveBtn').addEventListener('click', () => {
    const v = document.getElementById('priceIn').value.trim();
    if (!v || isNaN(v) || v <= 0) {
        alert('Please enter a valid price.');
        return;
    }
    const formatted = parseInt(v).toLocaleString();
    location.href = 'success.html?from=edit&id=' + hid + '&success=' + encodeURIComponent('Price updated to ' + formatted + ' THB!');
});
        </script>
</body>
</html>
